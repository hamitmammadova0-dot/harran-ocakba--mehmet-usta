<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harran Ocakbaşı</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #111;
    color: #fff;
    text-align: center;
}

header {
    background-color: #8B0000;
    padding: 30px 20px;
}

h1 {
    margin: 0;
    font-size: 32px;
    letter-spacing: 2px;
}

.menu {
    padding: 30px 20px;
}

.menu-item {
    background-color: #1c1c1c;
    margin: 15px auto;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    display: flex;
    justify-content: space-between;
    font-size: 18px;
}

.price {
    color: #FFD700;
    font-weight: bold;
}
footer {
    margin-top: 30px;
    padding: 15px;
    font-size: 14px;
    color: #aaa;
}
</style>
</head>

<body>

<header>
    <h1>Harran Ocakbaşı</h1>
</header>

<div class="menu">
    <div class="menu-item">
        <span>Patlıcanlı Domatesli Fıstıklı Çöp Şiş Ciğer Beyti</span>
        <span class="price">600 TL</span>
    </div>

    <div class="menu-item">
        <span>Tavuk & Kanat</span>
        <span class="price">400 TL</span>
    </div>

    <div class="menu-item">
        <span>Adana Kebap</span>
        <span class="price">500 TL</span>
    </div>

    <div class="menu-item">
        <span>Urfa Kebap</span>
        <span class="price">500 TL</span>
    </div>
</div>

<footer>
    Afiyet Olsun 🔥
</footer>

</body>
</html>
