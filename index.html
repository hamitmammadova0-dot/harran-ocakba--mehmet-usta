<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harran Ocakbaşı</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #111;
    color: white;
}

header {
    background: url('https://lh3.googleusercontent.com/gps-cs-s/AHVAwepmeQUcHzYN6RP3hq5XP4Zl3Xz6hdj5IGC26dxBsTBZytuj6O5KA__EzZ5ml8K073Cx3-hsbvXCytxO-abaE-3noJZp0wxh1wLeyJxdvp7yoXSpWZ1z-2Hxp6q8xIbsVBOilTce=s680-w680-h510-rw') center/cover;
    padding: 80px 20px;
    text-align: center;
}

header h1 {
    background: rgba(0,0,0,0.6);
    display: inline-block;
    padding: 15px 30px;
    border-radius: 10px;
    font-size: 32px;
}

.menu {
    padding: 30px 15px;
    display: grid;
    gap: 20px;
}

.card {
    background: #1c1c1c;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.price {
    color: gold;
    font-weight: bold;
}

footer {
    text-align: center;
    padding: 20px;
    color: #aaa;
}
</style>
</head>

<header>
    <h1>Harran Ocakbaşı</h1>
</header>

<div class="menu">

</div>

</div>

</div>
